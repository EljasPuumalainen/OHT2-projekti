<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Demo</title>
    <style>
      body { margin: 0; }

      #buttonCamera {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 100;
        padding: 10px 20px;
        cursor: pointer;
      }
      .menu-item {
        position: absolute;
        left: 20px;
        z-index: 100;
        background: white;
        padding: 5px;
        border-radius: 4px;
      }

      #piirto-wrap { top : 65px; }
      #katselu-wrap { top: 100px; }
    </style>
  </head>
  <body>

    <button id="buttonCamera">Vaihda 2D</button>

    <div id="piirto-wrap" class="menu-item">
      <input type="radio" id="piirtotila" name="tila" value="piirtotila">
      <label for="piirtotila">Piirto</label>
    </div>

    <div id="katselu-wrap" class="menu-item">
      <input type="radio" id="katselutila" name="tila" value="katselutila" checked>
      <label for="katselutila">Katselu</label>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
