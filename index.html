<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pohjapiirrossovellus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

  <!-- YLÄPALKKI -->
  <header id="topbar">
    <div id="topbar-left">
      <button id="buttonCamera" class="btn btn-accent">Vaihda 2D</button>
    </div>
    <div id="topbar-right">
      <div id="undo-wrap">
        <button id="buttonUndo" class="btn" title="Ctrl+Z">↩ Kumoa</button>
      </div>
      <div class="divider"></div>
      <button id="buttonSave" class="btn" title="Tallenna (Ctrl+S)">💾 Tallenna</button>
      <label class="btn btn-file" title="Lataa projekti">
        📂 Lataa
        <input type="file" id="lataaTiedosto" accept=".json">
      </label>
    </div>
  </header>

  <!-- VASEN PANEELI -->
  <nav id="leftpanel">

    <div class="panel-section">
      <div class="panel-heading">Työkalut</div>

      <input class="tool-radio" type="radio" id="katselutila" name="tila" value="katselutila">
      <label class="tool-label" for="katselutila">
        <span class="tool-icon">👁</span> Katselu
      </label>

      <input class="tool-radio" type="radio" id="siirtelytila" name="tila" value="siirtelytila">
      <label class="tool-label" for="siirtelytila">
        <span class="tool-icon">✥</span> Siirtely
      </label>

      <input class="tool-radio" type="radio" id="piirtotila" name="tila" value="piirtotila">
      <label class="tool-label" for="piirtotila">
        <span class="tool-icon">✏</span> Piirto
      </label>
    </div>

    <div class="panel-section">
      <div class="panel-heading">Lisää</div>

      <input class="tool-radio" type="radio" id="ovitila" name="tila" value="ovitila">
      <label class="tool-label" for="ovitila">
        <span class="tool-icon">🚪</span> Ovi
      </label>

      <input class="tool-radio" type="radio" id="ikkunatila" name="tila" value="ikkunatila">
      <label class="tool-label" for="ikkunatila">
        <span class="tool-icon">🪟</span> Ikkuna
      </label>

      <button id="btnSuorakaide" class="panel-btn">
        <span class="tool-icon">▭</span> Suorakaide
      </button>

      <button id="btnSylinteri" class="panel-btn">
        <span class="tool-icon">◯</span> Sylinteri
      </button>

      <button id="btnPortaat" class="panel-btn">
        <span class="tool-icon">≣</span> Portaat
      </button>

      <button id="btnHissi" class="panel-btn">
        <span class="tool-icon">▣</span> Hissi
      </button>

      <!-- Pohjakuva: -->
      <label class="panel-btn" style="cursor:pointer; position:relative; overflow:hidden;">
        <span class="tool-icon">🗺️</span> Pohjakuva
        <input type="file" id="lataaPohjakuvatiedosto" accept="image/*"
               style="position:absolute; inset:0; opacity:0; cursor:pointer;">
      </label>
    </div>

    <div class="panel-section">
      <div class="panel-heading">Asetukset</div>
      <label class="toggle-row" for="liikutaKaikkia">
        <span class="toggle-label-text">Liikuta kaikkia</span>
        <span class="switch">
          <input type="checkbox" id="liikutaKaikkia">
          <span class="slider"></span>
        </span>
      </label>
    </div>

  </nav>

  <!-- POHJAKUVAN KONTROLLIT -->
  <div id="pohjakuvaKontrollit">
    <div class="pk-header">
      <strong>Pohjakuva</strong>
      <button id="btnSuljePohjakuva">✕</button>
    </div>
    <label>Läpinäkyvyys:
      <input type="range" id="sliderOpasiteetti" min="0.05" max="1" step="0.05" value="0.5">
    </label>
    <label>Kuvan leveys (m):
      <input type="number" id="inputLeveys" min="0.5" max="200" step="0.5" value="10">
    </label>
    <label>Kuvan korkeus (m):
      <input type="number" id="inputKorkeus" min="0.5" max="200" step="0.5" value="10">
    </label>
    <button id="btnKalibroi" class="pk-btn">📐 Kalibroi mittakaava</button>
    <div id="kalibrointiInfo"></div>
    <div id="kalibrointiVahvistus">
      <label style="font-size:11px;">Oikea etäisyys (m):
        <input type="number" id="kalibrointiEtaisyys" min="0.1" step="0.1">
      </label>
      <div class="pk-btn-row">
        <button id="kalibrointiOK" class="pk-btn">✅ Käytä</button>
        <button id="kalibrointiPeruuta" class="pk-btn">❌ Peruuta</button>
      </div>
    </div>
    <button id="btnLukitsePohjakuva" class="pk-btn">🔒 Lukitse (L)</button>
  </div>

  <!-- SEINÄN MITTA -->
  <div id="mittausLabel"></div>

  <!-- PRIMITIIVIEN KONTROLLIT -->
  <div id="primitiiviModal">
    <h3 id="modalOtsikko"></h3>

    <div class="modal-field">
      <label>Nimi</label>
      <input id="pNimi" type="text" placeholder="Vapaaehtoinen…">
    </div>

    <div id="suorakaideKentat">
      <div class="modal-field">
        <label>Leveys (m)</label>
        <input id="pLeveys" type="number" value="1" step="0.5">
      </div>
      <div class="modal-field">
        <label>Syvyys (m)</label>
        <input id="pSyvyys" type="number" value="1" step="0.5">
      </div>
      <div class="modal-field">
        <label>Korkeus (m)</label>
        <input id="pKorkeus" type="number" value="2.5" step="0.5">
      </div>
    </div>

    <div id="sylinteriKentat" style="display:none">
      <div class="modal-field">
        <label>Halkaisija (m)</label>
        <input id="pHalkaisija" type="number" value="0.5" step="0.1">
      </div>
      <div class="modal-field">
        <label>Korkeus (m)</label>
        <input id="pSylKorkeus" type="number" value="2.5" step="0.5">
      </div>
    </div>

    <div id="portaatKentat" style="display:none">
      <div class="modal-field">
        <label>Leveys (m)</label>
        <input id="portaidenLeveys" type="number" value="2" step="0.5">
      </div>
      <div class="modal-field">
        <label>Syvyys (m)</label>
        <input id="portaidenSyvyys" type="number" value="3" step="0.5">
      </div>
      <div class="modal-field">
        <label>Korkeus (m)</label>
        <input id="portaidenKorkeus" type="number" value="1.5" step="0.1">
      </div>
      <div class="modal-field">
        <label>Askelmien määrä</label>
        <input id="portaidenAskelmat" type="number" value="6" step="1" min="2">
      </div>
    </div>

    <div id="hissiKentat" style="display:none">
      <div class="modal-field">
        <label>Leveys (m)</label>
        <input id="hissiLeveys" type="number" value="2" step="0.5">
      </div>
      <div class="modal-field">
        <label>Syvyys (m)</label>
        <input id="hissiSyvyys" type="number" value="2" step="0.5">
      </div>
      <div class="modal-field">
        <label>Korkeus (m)</label>
        <input id="hissiKorkeus" type="number" value="2.5" step="0.1">
      </div>
    </div>

    

    <div class="modal-actions">
      <button id="modalOK" class="btn btn-accent">Lisää</button>
      <button id="modalPeruuta" class="btn">Peruuta</button>
    </div>
  </div>

  <!-- ALAPALKKI -->
  <footer id="bottombar">
    <span id="status-mode">Katselu</span>
    <span id="status-desc">Selaa ja tarkastele pohjapiirustusta vapaasti.</span>
  </footer>

  <!-- KOODIT -->
  <script type="module" src="/main.js"></script>

  <script>
    /* UNDO */
    document.getElementById('buttonUndo').addEventListener('click', () => {
      document.dispatchEvent(new CustomEvent('undo'));
    });
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        document.dispatchEvent(new CustomEvent('undo'));
      }
    });

    /* ALAPALKIN STATUS */
    const statusMode = document.getElementById('status-mode');
    const statusDesc = document.getElementById('status-desc');

    const modeInfo = {
      katselutila:  { label: 'Katselu',  desc: 'Selaa ja tarkastele pohjapiirustusta vapaasti.' },
      siirtelytila: { label: 'Siirtely', desc: 'Raahaa objekteja. Käännä seinää hiiren oikealla. Poista valittu objekti "Delete" -napilla' },
      piirtotila:   { label: 'Piirto',   desc: 'Pidä hiiri pohjassa ja vedä piirtääksesi seinä. Hiiren oikealla voit tarttua seinän päädystä ja muokata seinää. Kamera lukittu 2D-näkymään.' },
      ikkunatila:   { label: 'Ikkuna',   desc: 'Vie hiiri seinän päälle ja klikkaa lisätäksesi ikkuna.' },
      ovitila:      { label: 'Ovi',      desc: 'Vie hiiri seinän päälle ja klikkaa lisätäksesi ovi. Oven kätisyys kääntyy hiiren oikealla.' },
    };

    document.querySelectorAll('input[name="tila"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const info = modeInfo[e.target.value];
        if (info) { statusMode.textContent = info.label; statusDesc.textContent = info.desc; }
      });
    });

    document.getElementById('liikutaKaikkia').addEventListener('change', (e) => {
      if (e.target.checked) {
        statusMode.textContent = 'Liikuta kaikkia';
        statusDesc.textContent = 'Kaikki objektit liikkuvat yhdessä. Siirtelytila aktivoitu automaattisesti.';
      } else {
        const checked = document.querySelector('input[name="tila"]:checked');
        if (checked && modeInfo[checked.value]) {
          statusMode.textContent = modeInfo[checked.value].label;
          statusDesc.textContent = modeInfo[checked.value].desc;
        }
      }
    });
  </script>

</body>
</html>
